<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Official FIFA World Cup 2026 Dashboard</title>
<style>
  body {
    background-color: #ffffff;
    display: flex;
    flex-direction: row;
    margin: 0;
    font-family: 'Arial Black', sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* Links: De lijst met 8 scoreborden */
  .scoreboard-list {
    width: 480px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 45px;
    border-right: 2px solid #eee;
    overflow-y: auto;
    padding: 40px 0;
    box-sizing: border-box;
    flex-shrink: 0;
  }

  /* Rechts: Container voor de video */
  .video-container {
    flex-grow: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #f9f9f9;
    padding: 20px;
  }

  /* De video wrapper: nu 20% groter (1020px max-width) */
  .video-wrapper {
    width: 100%;
    max-width: 1020px; 
    aspect-ratio: 16 / 9;
    background-color: #000;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  .video-wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* OORSPRONKELIJKE SCOREBOARD STIJLEN */
  .scoreboard-wrapper { position: relative; padding-bottom: 6px; min-width: 420px; }
  .scoreboard-main { display: flex; align-items: center; background-color: #0d0d0d; border-radius: 12px; height: 42px; padding: 0 16px; z-index: 2; position: relative; }
  .team-side { display: flex; align-items: center; flex: 1; color: #ffffff; }
  .team-side.home { justify-content: flex-end; padding-right: 8px; }
  .team-side.away { justify-content: flex-start; padding-left: 8px; }
  .country-flag { width: 38px; height: 24px; border: 1px solid #ffffff; border-radius: 4px; overflow: hidden; }
  .country-flag img { width: 100%; height: 100%; object-fit: cover; }
  .indicator-dot { width: 14px; height: 14px; border-radius: 50%; margin: 0 12px; border: 2px solid #ffffff; }
  .team-name-code { font-family: 'Copperplate', fantasy; font-size: 28px; text-transform: uppercase; }
  
  .score-block-center { display: flex; align-items: center; background-color: #00f2c4; border-radius: 10px; height: 47px; padding: 0 2px; margin: 0 4px; position: relative; z-index: 3; top: 2px; }
  .score-number { color: #0a0a0a; font-family: "Arial", Sans-serif; font-size: 32px; font-weight: 600; min-width: 32px; text-align: center; }
  
  .fifa-badge-middle { background-color: #0d0d0d; border-radius: 10px; width: 44px; height: 60px; display: flex; justify-content: center; align-items: center; z-index: 5; margin: 0 2px; border: 1px solid #222; }
  .fifa-badge-middle img { width: 35px; height: auto; object-fit: contain; }

  .layer-line-bottom { position: absolute; bottom: 2px; height: 44px; width: 43%; z-index: 1; }
  .line-left { right: 50%; margin-right: 37px; background: linear-gradient(90deg, #EE937B 50%, #CA0F04 50%); border-bottom-left-radius: 13px; border-top-left-radius: 13px; }
  .line-right { left: 50%; margin-left: 37px; background: linear-gradient(135deg, #ADDA00 50%, #9574D8 50%); border-bottom-right-radius: 13px; border-top-right-radius: 13px; }
</style>
</head>
<body>

<div class="scoreboard-list" id="scoreboard-container"></div>

<div class="video-container">
    <div class="video-wrapper">
        <iframe src="https://www.youtube-nocookie.com/embed/videoseries?list=PLnJJ42LOJsdHCqcsxa9fl9jZgmUqcMjbu&autoplay=1&mute=1&loop=1" 
                allow="autoplay; encrypted-media" allowfullscreen>
        </iframe>
    </div>
</div>

<script>
  const apiKey = '40dc94f573f9513083b68c7d7ab80ae2';
  const shirtColors = {'NED': '#ff6600', 'SUI': '#dc1523', 'BIH': '#002f6c', 'FRA': '#002395', 'ARG': '#75aadb', 'BRA': '#fecb00', 'GER': '#ffffff', 'ESP': '#c60b1e', 'ITA': '#004b93', 'ENG': '#ffffff', 'USA': '#002868', 'MEX': '#016847', 'CAN': '#ff0000', 'BEL': '#e30613', 'POR': '#ff0000', 'MAR': '#c1272d', 'CRO': '#ff0000', 'JPN': '#000054', 'SEN': '#ffffff', 'URU': '#43a1d5', 'COL': '#fcd116'};

  async function fetchMatches() {
    try {
      const response = await fetch('https://v3.football.api-sports.io/fixtures?league=1&season=2026', {
        headers: {'x-rapidapi-key': apiKey, 'x-rapidapi-host': 'v3.football.api-sports.io'}
      });
      const data = await response.json();
      
      const finished = data.response
        .filter(m => ['FT', 'AET', 'PEN'].includes(m.fixture.status.short))
        .sort((a, b) => new Date(b.fixture.date) - new Date(a.fixture.date))
        .slice(0, 8);

      const container = document.getElementById('scoreboard-container');
      container.innerHTML = '';

      finished.forEach(m => {
        const homeCode = (m.teams.home.code || m.teams.home.name.substring(0, 3)).toUpperCase();
        const awayCode = (m.teams.away.code || m.teams.away.name.substring(0, 3)).toUpperCase();
        
        const div = document.createElement('div');
        div.innerHTML = `
          <div class="scoreboard-wrapper">
            <div class="scoreboard-main">
              <div class="team-side home">
                <div class="country-flag"><img src="${m.teams.home.logo}"></div>
                <div class="indicator-dot" style="background-color: ${shirtColors[homeCode] || '#7cc0ff'}"></div>
                <div class="team-name-code">${homeCode}</div>
              </div>
              <div class="score-block-center">
                <div class="score-number">${m.goals.home}</div>
                <div class="fifa-badge-middle"><img src="WKwhite.png" onerror="this.style.display='none'; this.parentNode.innerText='26'"></div>
                <div class="score-number">${m.goals.away}</div>
              </div>
              <div class="team-side away">
                <div class="team-name-code">${awayCode}</div>
                <div class="indicator-dot" style="background-color: ${shirtColors[awayCode] || '#7cc0ff'}"></div>
                <div class="country-flag"><img src="${m.teams.away.logo}"></div>
              </div>
            </div>
            <div class="layer-line-bottom line-left"></div>
            <div class="layer-line-bottom line-right"></div>
          </div>
        `;
        container.appendChild(div);
      });
    } catch (e) { console.error(e); }
  }

  fetchMatches();
</script>

</body>
</html>
